name: Deploy App (Dev)

# Deploys the Next.js application to AWS App Runner on every push to main.
# Infrastructure (CDK) and book data are handled by their own workflows.
#
# Flow: CI passes → build verified → describe current service → render
# updated config with latest env vars → update App Runner service →
# wait for deployment → verify health.

on:
  push:
    branches:
      - main
    paths-ignore:
      # Skip deploy when ONLY infra or book-data scripts changed —
      # those have their own workflows.
      - 'infra/**'
      - 'scripts/book/**'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even if no code changed'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-app-dev
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  BOOK_TABLE_NAME: ChapterFlowApp
  BOOK_ANALYTICS_TABLE_NAME: ChapterFlowInsights
  BOOK_INGEST_BUCKET: chapterflowbackend-chapterflowingestbucketdb5de03f-3yot64zeyaq7
  BOOK_CONTENT_BUCKET: chapterflowbackend-chapterflowcontentbucket2ed1848-qo8kewolurc0
  SSM_PARAMETER_PREFIX: /chapterflow/prod

jobs:
  # ── Gate: ensure CI has passed ──────────────────────────────────────────
  verify-build:
    name: Verify Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # ── Deploy: update App Runner service ───────────────────────────────────
  deploy-app:
    name: Deploy to App Runner
    runs-on: ubuntu-latest
    needs: [verify-build]
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      # Describe the existing App Runner service to get current config
      - name: Describe App Runner service
        id: describe
        run: |
          aws apprunner describe-service \
            --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
            > /tmp/service-description.json

          SERVICE_URL=$(jq -r '.Service.ServiceUrl' /tmp/service-description.json)
          SERVICE_STATUS=$(jq -r '.Service.Status' /tmp/service-description.json)
          echo "service_url=${SERVICE_URL}" >> "$GITHUB_OUTPUT"
          echo "service_status=${SERVICE_STATUS}" >> "$GITHUB_OUTPUT"
          echo "Current service status: ${SERVICE_STATUS}"
          echo "Current service URL: https://${SERVICE_URL}"

      # Render updated config using the existing helper script
      - name: Render update payload
        run: |
          node scripts/book/render-apprunner-update.mjs /tmp/service-description.json \
            > /tmp/update-payload.json
          echo "Update payload rendered successfully"
        env:
          BOOK_TABLE_NAME: ${{ env.BOOK_TABLE_NAME }}
          BOOK_ANALYTICS_TABLE_NAME: ${{ env.BOOK_ANALYTICS_TABLE_NAME }}
          BOOK_INGEST_BUCKET: ${{ env.BOOK_INGEST_BUCKET }}
          BOOK_CONTENT_BUCKET: ${{ env.BOOK_CONTENT_BUCKET }}
          SSM_PARAMETER_PREFIX: ${{ env.SSM_PARAMETER_PREFIX }}
          APP_RUNNER_INSTANCE_ROLE_ARN: ${{ secrets.APP_RUNNER_INSTANCE_ROLE_ARN }}
          APP_RUNNER_CONNECTION_ARN: ${{ secrets.APP_RUNNER_CONNECTION_ARN }}

      # Trigger the deployment
      - name: Update App Runner service
        id: update
        run: |
          OPERATION_ID=$(aws apprunner update-service \
            --cli-input-json file:///tmp/update-payload.json \
            --query 'OperationId' \
            --output text)
          echo "operation_id=${OPERATION_ID}" >> "$GITHUB_OUTPUT"
          echo "Deployment started: operation ${OPERATION_ID}"

      # Wait for deployment to complete (polls every 30s, up to 15 min)
      - name: Wait for deployment
        run: |
          SERVICE_ARN="${{ secrets.APP_RUNNER_SERVICE_ARN }}"
          echo "Waiting for App Runner deployment to complete..."

          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${SERVICE_ARN}" \
              --query 'Service.Status' \
              --output text)

            echo "  Attempt ${i}/30 — status: ${STATUS}"

            if [ "${STATUS}" = "RUNNING" ]; then
              echo "Deployment complete — service is RUNNING"
              exit 0
            fi

            if [ "${STATUS}" = "CREATE_FAILED" ] || [ "${STATUS}" = "DELETE_FAILED" ] || [ "${STATUS}" = "UPDATE_FAILED" ]; then
              echo "Deployment FAILED with status: ${STATUS}"
              exit 1
            fi

            sleep 30
          done

          echo "Timed out waiting for deployment (15 min)"
          exit 1

      # Verify the deployment is healthy
      - name: Health check
        run: |
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
            --query 'Service.ServiceUrl' \
            --output text)

          echo "Running health check against https://${SERVICE_URL}..."

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            --retry 3 \
            --retry-delay 5 \
            "https://${SERVICE_URL}/")

          echo "Health check response: HTTP ${HTTP_STATUS}"

          if [ "${HTTP_STATUS}" -ge 200 ] && [ "${HTTP_STATUS}" -lt 400 ]; then
            echo "Health check PASSED"
          else
            echo "Health check FAILED — got HTTP ${HTTP_STATUS}"
            exit 1
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${GITHUB_SHA::8}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${GITHUB_REF_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Service URL** | https://${{ steps.describe.outputs.service_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | ${GITHUB_ACTOR} |" >> "$GITHUB_STEP_SUMMARY"
