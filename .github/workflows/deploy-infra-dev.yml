name: Deploy Infra (Dev)

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra-dev.yml'
  workflow_dispatch:
    inputs:
      skip_seed:
        description: 'Skip book-data seeding step'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-infra-dev
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  CDK_STACK_NAME: ChapterFlowBackend
  # Must match tableName in infra/lib/chapterflow-backend-stack.ts
  BOOK_TABLE_NAME: ChapterFlowApp

jobs:
  deploy-dev:
    name: Deploy CDK Stack to Dev
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install infra dependencies
        run: npm ci

      - name: Debug OIDC claims
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "Missing GitHub OIDC environment variables."
            exit 1
          fi

          RESPONSE="$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")"
          TOKEN="$(node -e "const r = JSON.parse(process.argv[1]); if (!r.value) process.exit(2); process.stdout.write(r.value);" "${RESPONSE}")"

          node - "${TOKEN}" <<'NODE'
          const token = process.argv[2];
          const parts = token.split(".");
          if (parts.length < 2) {
            throw new Error("Invalid OIDC token");
          }
          const payload = JSON.parse(Buffer.from(parts[1], "base64url").toString("utf8"));
          const keys = [
            "iss",
            "aud",
            "sub",
            "repository",
            "repository_owner",
            "ref",
            "workflow",
            "job_workflow_ref",
            "actor",
          ];
          const output = {};
          for (const key of keys) {
            if (payload[key] !== undefined) output[key] = payload[key];
          }
          console.log("OIDC_CLAIMS", JSON.stringify(output, null, 2));
          NODE

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK deploy
        run: npm run cdk -- deploy $CDK_STACK_NAME --require-approval never

  # ── Post-deploy: seed reference data ──────────────────────────────────────
  # Runs after every successful CDK deployment so any fresh/recreated DynamoDB
  # table is immediately populated with license keys and other seed data.
  # The seed script is idempotent — re-running it on an existing table is safe.
  seed-book-data:
    name: Seed Book Data
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    timeout-minutes: 10
    # Use github.event.inputs (not inputs) so the expression is safe on push triggers
    # where workflow_dispatch inputs are absent — the job runs unless explicitly skipped.
    if: ${{ github.event.inputs.skip_seed != 'true' }}
    # Explicit job-level permissions are required for OIDC token injection —
    # relying solely on workflow-level permissions is not reliable across runner versions.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Seed license keys
        run: node scripts/book/seed-license-keys.mjs
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          BOOK_TABLE_NAME: ${{ env.BOOK_TABLE_NAME }}
