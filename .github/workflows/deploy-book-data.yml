name: Deploy Book Data (Dev)

# Triggers:
#   1. Push to main that touches any seed/book script — e.g. adding new license keys
#      without a corresponding infra change (infra deploy handles its own seeding inline)
#   2. workflow_dispatch — manual re-seed at any time (e.g. after key revocation)
#
# NOTE: Post-infra-deploy seeding is handled by the seed-book-data job inside
#       deploy-infra-dev.yml, which avoids the workflow_run OIDC sub-claim
#       mismatch that causes "Credentials could not be loaded" errors.
on:
  push:
    branches:
      - main
    paths:
      - 'scripts/book/**'
      - '.github/workflows/deploy-book-data.yml'
  workflow_dispatch:

concurrency:
  group: deploy-book-data-dev
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  # Must match tableName in infra/lib/chapterflow-backend-stack.ts
  BOOK_TABLE_NAME: ChapterFlowApp
  BOOK_INGEST_BUCKET: chapterflowbackend-chapterflowingestbucketdb5de03f-3yot64zeyaq7
  BOOK_CONTENT_BUCKET: chapterflowbackend-chapterflowcontentbucket2ed1848-qo8kewolurc0

jobs:
  seed-book-data:
    name: Seed Book Data
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Explicit job-level permissions are required for OIDC token injection —
    # relying solely on workflow-level permissions is not reliable across runner versions.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # --ignore-scripts: skips postinstall hooks (e.g. Puppeteer, canvas compilation)
        # Note: cannot use --omit=optional because tsx requires esbuild's platform binary
        run: npm ci --ignore-scripts

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Seed license keys
        run: node scripts/book/seed-license-keys.mjs
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          BOOK_TABLE_NAME: ${{ env.BOOK_TABLE_NAME }}

      - name: Publish bundled book packages
        run: npx tsx scripts/book/publish-bundled-packages.ts
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          BOOK_TABLE_NAME: ${{ env.BOOK_TABLE_NAME }}
          BOOK_INGEST_BUCKET: ${{ env.BOOK_INGEST_BUCKET }}
          BOOK_CONTENT_BUCKET: ${{ env.BOOK_CONTENT_BUCKET }}

      - name: Publish library catalog and covers
        run: npx tsx scripts/book/publish-library-assets.ts
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          BOOK_CONTENT_BUCKET: ${{ env.BOOK_CONTENT_BUCKET }}
