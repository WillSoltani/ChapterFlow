<svg width="1200" height="1800" viewBox="0 0 1200 1800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Atomic Habits cover</title>
  <desc id="desc">Auto-generated themed cover for Atomic Habits by James Clear.</desc>
  <defs>
    <linearGradient id="g_ah_bg" x1="0" y1="0" x2="0" y2="1800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1800" fill="url(#g_ah_bg)"/>

  <!-- subtle grid lines -->
  <g stroke="#99f6e4" opacity="0.07">
    <line x1="160" y1="320" x2="160" y2="1460" stroke-width="3"/>
    <line x1="320" y1="320" x2="320" y2="1460" stroke-width="2"/>
    <line x1="480" y1="320" x2="480" y2="1460" stroke-width="2"/>
    <line x1="640" y1="320" x2="640" y2="1460" stroke-width="3"/>
    <line x1="800" y1="320" x2="800" y2="1460" stroke-width="2"/>
    <line x1="960" y1="320" x2="960" y2="1460" stroke-width="2"/>
  </g>

  <!-- horizontal accent lines -->
  <path d="M140 430 L1060 430" stroke="#2dd4bf" stroke-width="8" opacity="0.18"/>
  <path d="M140 1330 L1060 1330" stroke="#2dd4bf" stroke-width="8" opacity="0.15"/>

  <!-- center panel -->
  <rect x="116" y="304" width="968" height="1036" rx="38" fill="#134e4a" stroke="#2dd4bf" stroke-width="6" opacity="0.9"/>

  <!-- compound growth curve (stylized) -->
  <path d="M200 1180 Q400 1160 520 1080 Q640 980 700 860 Q760 720 820 560 Q860 440 900 360" stroke="#34d399" stroke-width="10" fill="none" opacity="0.7" stroke-linecap="round"/>
  <!-- area under curve -->
  <path d="M200 1180 Q400 1160 520 1080 Q640 980 700 860 Q760 720 820 560 Q860 440 900 360 L900 1180 Z" fill="#34d399" opacity="0.08"/>

  <!-- loop icon (circular arrows — habit loop) -->
  <g transform="translate(540 620)">
    <circle cx="60" cy="60" r="52" stroke="#2dd4bf" stroke-width="8" fill="none" opacity="0.6"/>
    <path d="M60 8 A52 52 0 1 1 12 72" stroke="#2dd4bf" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
    <polygon points="8,58 16,78 26,62" fill="#2dd4bf" opacity="0.9"/>
  </g>

  <!-- top band -->
  <rect x="0" y="0" width="1200" height="238" fill="#0f766e" opacity="0.96"/>
  <!-- bottom band -->
  <rect x="0" y="1454" width="1200" height="346" fill="#0d9488" opacity="0.95"/>

  <!-- author -->
  <text x="600" y="136" text-anchor="middle" fill="#ccfbf1" font-family="Georgia, serif" font-size="60" font-weight="700" letter-spacing="3">JAMES CLEAR</text>
  <text x="600" y="208" text-anchor="middle" fill="#99f6e4" font-family="'Trebuchet MS', Arial, sans-serif" font-size="28" letter-spacing="5">PRODUCTIVITY</text>

  <!-- title -->
  <text x="600" y="1100" text-anchor="middle" fill="#ccfbf1" font-family="'Trebuchet MS', Arial, sans-serif" font-size="96" font-weight="700" letter-spacing="2">ATOMIC</text>
  <text x="600" y="1210" text-anchor="middle" fill="#ccfbf1" font-family="'Trebuchet MS', Arial, sans-serif" font-size="96" font-weight="700" letter-spacing="2">HABITS</text>
  <text x="600" y="1290" text-anchor="middle" fill="#5eead4" font-family="Georgia, serif" font-size="34" font-style="italic">An Easy &amp; Proven Way to Build Good Habits</text>

  <!-- tag pills -->
  <g>
    <rect x="348" y="1466" width="200" height="42" rx="21" fill="#ccfbf1" opacity="0.14" stroke="#ccfbf1" stroke-width="2"/>
    <text x="448" y="1494" text-anchor="middle" fill="#ccfbf1" font-family="'Trebuchet MS', Arial, sans-serif" font-size="20" letter-spacing="1">IDENTITY</text>
  </g>
  <g>
    <rect x="574" y="1466" width="200" height="42" rx="21" fill="#ccfbf1" opacity="0.14" stroke="#ccfbf1" stroke-width="2"/>
    <text x="674" y="1494" text-anchor="middle" fill="#ccfbf1" font-family="'Trebuchet MS', Arial, sans-serif" font-size="20" letter-spacing="1">SYSTEMS</text>
  </g>

  <text x="600" y="1560" text-anchor="middle" fill="#ccfbf1" font-family="'Trebuchet MS', Arial, sans-serif" font-size="28" letter-spacing="3">HABITS  ·  IDENTITY  ·  SYSTEMS</text>
  <text x="600" y="1620" text-anchor="middle" fill="#99f6e4" font-family="Georgia, serif" font-size="28">Tiny changes. Remarkable results.</text>
  <text x="600" y="1680" text-anchor="middle" fill="#ccfbf1" font-family="'Trebuchet MS', Arial, sans-serif" font-size="24" letter-spacing="2">Modern Edition · Practical Lessons · Real Scenarios</text>
</svg>
