  <path d="M175 200 Q175 170 200 170 Q225 170 225 200 Q225 230 200 230 Q175 230 175 200Z" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="170" x2="200" y2="230" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <path d="M180 185 Q190 175 200 185" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <path d="M200 185 Q210 175 220 185" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <path d="M180 210 Q190 220 200 210" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
